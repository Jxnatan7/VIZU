name: Build iOS (Sideloading)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🍏 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: 🚀 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠️ Generate Native Folders (Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: 🔏 Disable Code Signing in project.pbxproj
        run: |
          PBXPROJ="ios/VIZU.xcodeproj/project.pbxproj"
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGNING_REQUIRED = [^;]*;/CODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGNING_ALLOWED = [^;]*;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"
          # Also add the settings if they don't exist in the Release config block
          echo "✅ Patched project.pbxproj signing settings"

      - name: 🏗️ Build App (Xcode)
        run: |
          cd ios
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme VIZU \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: 📦 Package as .IPA (Sideloading Workaround)
        run: |
          APP_PATH=$(find ios/derived_data -name "*.app" -not -path "*/PlugIns/*" | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r vizu-unsigned.ipa Payload

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/vizu-unsigned.ipa
